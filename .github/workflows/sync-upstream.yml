name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream (exclude .github/workflows)
        run: |
          git remote add upstream https://github.com/javpower/O4OpenAI.git
          git fetch upstream main
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          mkdir -p /tmp/wf
          cp -r .github/workflows/* /tmp/wf/ 2>/dev/null || true
          git merge upstream/main --no-edit -X theirs
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -r /tmp/wf/* .github/workflows/ 2>/dev/null || true
          git add -A
          git commit --amend --no-edit
          git push --force-with-lease origin main
